<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tarô Cigano — Revelação de Traição</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@400;500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0008;
  --primary: #7c2d92;
  --accent: #c084fc;
  --gold: #f59e0b;
  --text: #f3e8ff;
  --text-muted: rgba(243,232,255,0.6);
  --card-bg: rgba(124,45,146,0.12);
  --card-border: rgba(192,132,252,0.2);
  --card-border-hover: rgba(192,132,252,0.6);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

html{scroll-behavior:smooth}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Inter',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* Radial glow background */
body::before{
  content:'';
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:800px;height:800px;
  background:radial-gradient(ellipse at center, rgba(124,45,146,0.08) 0%, transparent 70%);
  pointer-events:none;
  z-index:0;
}

canvas#particles{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  pointer-events:none;
  z-index:0;
}

#app{
  position:relative;
  z-index:1;
  max-width:480px;
  margin:0 auto;
  padding:0 24px;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* ─── PROGRESS BAR ─────────────────────────── */
#prog-wrap{
  padding:20px 0 0;
  display:none;
}
#prog-label{
  font-family:'Cinzel',serif;
  font-size:11px;
  letter-spacing:0.15em;
  color:var(--text-muted);
  margin-bottom:8px;
  text-align:center;
}
#prog-track{
  height:3px;
  background:rgba(192,132,252,0.15);
  border-radius:99px;
  overflow:hidden;
}
#prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--primary),var(--gold));
  border-radius:99px;
  transition:width 400ms ease;
  box-shadow:0 0 8px rgba(245,158,11,0.5);
  width:0%;
}

/* ─── SCREEN ────────────────────────────────── */
#screen{
  flex:1;
  display:flex;
  flex-direction:column;
  padding-bottom:40px;
  contain:layout style paint;
}
#screen{transition:opacity 60ms ease}
#screen.s-out{opacity:0}

/* ─── INTRO ─────────────────────────────────── */
.intro{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  text-align:center;
  padding:40px 0 60px;
}

.cards-stage{
  position:relative;
  width:260px;
  height:180px;
  margin-top:0;
  margin-bottom:24px;
}

.t-card{
  position:absolute;
  width:72px;
  height:116px;
  background:linear-gradient(160deg,#1a0525,#2d0a45);
  border:1.5px solid rgba(245,158,11,0.55);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  box-shadow:0 0 18px rgba(124,45,146,0.55),inset 0 0 16px rgba(124,45,146,0.1);
}
.t-card::before{
  content:'';
  position:absolute;
  inset:5px;
  border:1px solid rgba(245,158,11,0.25);
  border-radius:4px;
}
.t-card::after{
  content:'✦';
  position:absolute;
  bottom:8px;
  font-size:10px;
  color:rgba(245,158,11,0.5);
}

.t-card:nth-child(1){
  left:10px;top:20px;
  animation:fl1 7s ease-in-out infinite;
}
.t-card:nth-child(2){
  left:94px;top:0;
  animation:fl2 6s ease-in-out infinite;
  z-index:2;
}
.t-card:nth-child(3){
  right:10px;top:25px;
  animation:fl3 8s ease-in-out infinite;
}

@keyframes fl1{0%,100%{transform:translateY(0) rotate(-8deg)}50%{transform:translateY(-18px) rotate(-5deg)}}
@keyframes fl2{0%,100%{transform:translateY(0) rotate(2deg)}50%{transform:translateY(-24px) rotate(5deg)}}
@keyframes fl3{0%,100%{transform:translateY(0) rotate(11deg)}50%{transform:translateY(-14px) rotate(8deg)}}

.intro-eyebrow{
  font-family:'Cinzel',serif;
  font-size:11px;
  letter-spacing:0.2em;
  color:var(--gold);
  margin-bottom:16px;
  opacity:0.8;
}
.intro h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,7vw,40px);
  font-weight:300;
  line-height:1.25;
  color:var(--text);
  margin-bottom:24px;
  letter-spacing:0.02em;
}
.intro h1 em{
  font-style:italic;
  color:var(--accent);
}
.intro-barnum{
  font-size:13px;
  color:rgba(243,232,255,0.4);
  font-style:italic;
  line-height:1.6;
  max-width:320px;
  text-align:center;
  margin:0 auto 12px;
}
.intro-sub{
  font-size:15px;
  color:var(--text-muted);
  line-height:1.65;
  max-width:340px;
  margin:0 auto 36px;
}
.btn-primary{
  width:100%;
  padding:18px 24px;
  background:linear-gradient(135deg,var(--primary),#5b21b6);
  border:none;
  border-radius:12px;
  color:#fff;
  font-family:'Cinzel',serif;
  font-size:17px;
  letter-spacing:0.08em;
  cursor:pointer;
  box-shadow:0 0 30px rgba(124,45,146,0.6);
  animation:btnPulse 2s ease-in-out infinite;
  transition:transform 150ms,box-shadow 150ms;
}
@keyframes btnPulse{
  0%,100%{box-shadow:0 0 24px rgba(124,45,146,0.5)}
  50%{box-shadow:0 0 40px rgba(245,158,11,0.4),0 0 60px rgba(124,45,146,0.6)}
}
.intro-social{
  margin-top:16px;
  font-size:12px;
  color:var(--text-muted);
  letter-spacing:0.05em;
}
.intro-social span{color:var(--gold)}

/* ─── STEP SCREEN ───────────────────────────── */
.step-wrap{
  padding-top:32px;
}
.step-eyebrow{
  font-family:'Cinzel',serif;
  font-size:11px;
  letter-spacing:0.15em;
  color:var(--gold);
  opacity:0.8;
  margin-bottom:20px;
  text-align:center;
}
.step-sub{
  font-size:13px;
  color:var(--text-muted);
  line-height:1.7;
  margin-bottom:20px;
  font-style:italic;
  text-align:center;
}
.step-q{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(22px,5.5vw,28px);
  font-weight:400;
  line-height:1.35;
  color:var(--text);
  margin-bottom:28px;
  text-align:center;
}

/* ─── OPTIONS ───────────────────────────────── */
.options{display:flex;flex-direction:column;gap:12px}

.opt{
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px 18px;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:12px;
  cursor:pointer;
  transition:border-color 150ms,box-shadow 150ms,background 150ms;
}
.opt.selected{
  border-color:var(--gold);
  background:rgba(245,158,11,0.1);
  box-shadow:0 0 16px rgba(245,158,11,0.2);
}
.opt-icon{font-size:22px;flex-shrink:0;line-height:1}
.opt-dot{
  width:12px;height:12px;
  border-radius:50%;
  flex-shrink:0;
}
.opt-text{
  font-size:15px;
  line-height:1.45;
  color:var(--text);
  flex:1;
}

/* ─── INFO VISUAL (Step 3) ──────────────────── */
.info-visual{padding:4px 0 20px}
.info-hero-wrap{
  width:100%;
  border-radius:12px;
  margin-bottom:20px;
  background:linear-gradient(160deg,#1a0525,#2d0a45);
  border:1px solid rgba(192,132,252,0.15);
  position:relative;
  display:flex;align-items:center;justify-content:center;
  min-height:80px;
}
.info-hero-star{
  font-size:36px;color:rgba(245,158,11,0.45);
  padding:40px 0;
  pointer-events:none;
  transition:opacity 300ms;
}
.info-hero-wrap.loaded .info-hero-star{opacity:0;position:absolute}
.info-hero-img{
  width:100%;height:auto;
  display:block;
  border-radius:12px;
  opacity:0;transition:opacity 400ms;
}
.info-hero-wrap.loaded .info-hero-img{opacity:1}
.info-v-title{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(22px,5.5vw,28px);font-weight:400;
  color:var(--text);text-align:center;
  line-height:1.35;margin-bottom:24px;
}
.info-mini-cards{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.info-mini-card{
  display:flex;align-items:center;gap:14px;
  background:rgba(124,45,146,0.12);
  border:1px solid rgba(192,132,252,0.18);
  border-radius:12px;padding:14px 16px;
}
.info-mini-icon{font-size:22px;flex-shrink:0}
.info-mini-text{font-size:14px;color:var(--text-muted);line-height:1.5}
.info-highlight{
  background:rgba(120,53,15,0.15);
  border:1.5px solid rgba(245,158,11,0.4);
  border-radius:14px;padding:20px 18px;
  text-align:center;margin-bottom:22px;
  font-size:15px;color:var(--text-muted);
  line-height:1.8;font-style:italic;
}
.info-impact{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(24px,6vw,30px);font-style:italic;font-weight:400;
  color:var(--gold);text-align:center;line-height:1.4;
  margin-bottom:28px;
  text-shadow:0 0 16px rgba(245,158,11,0.3);
}
.info-separator{
  display:flex;align-items:center;gap:12px;margin:22px 0;
}
.info-separator::before,.info-separator::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,transparent,rgba(245,158,11,0.5),transparent);
}
.info-sep-icon{font-size:14px;color:var(--gold);flex-shrink:0}
.info-highlight-icon{font-size:28px;display:block;margin-bottom:10px}

/* ─── INFO CARD ─────────────────────────────── */
.info-card{
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:16px;
  padding:32px 24px;
  text-align:center;
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  margin-top:8px;
}
.info-icon{
  font-size:52px;
  margin-bottom:20px;
  display:block;
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{filter:drop-shadow(0 0 8px rgba(245,158,11,0.4))}
  50%{filter:drop-shadow(0 0 20px rgba(245,158,11,0.8))}
}
.info-title{
  font-family:'Cormorant Garamond',serif;
  font-size:24px;
  font-weight:400;
  color:var(--accent);
  margin-bottom:16px;
}
.info-text{
  font-size:14px;
  color:var(--text-muted);
  line-height:1.8;
  margin-bottom:28px;
}
.info-text strong{color:var(--text)}
.btn-continue{
  width:100%;
  padding:16px;
  background:transparent;
  border:1px solid var(--card-border-hover);
  border-radius:10px;
  color:var(--accent);
  font-family:'Cinzel',serif;
  font-size:14px;
  letter-spacing:0.08em;
  cursor:pointer;
  transition:background 200ms,box-shadow 200ms;
}
.btn-continue:hover{
  background:rgba(192,132,252,0.1);
  box-shadow:0 0 16px rgba(192,132,252,0.2);
}

/* ─── SIGN GRID ─────────────────────────────── */
.sign-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-top:4px;
}
.sign-card{
  aspect-ratio:1;
  background:rgba(124,45,146,0.20);
  border:1px solid rgba(245,158,11,0.3);
  border-radius:12px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:6px;
  cursor:pointer;
  transition:border-color 150ms,background 150ms;
}
.sign-card.selected{
  border-color:var(--gold);
  background:rgba(245,158,11,0.12);
  box-shadow:0 0 14px rgba(245,158,11,0.25);
}
.sign-svg{width:50px;height:50px;display:flex;align-items:center;justify-content:center;}
.sign-name{
  font-family:'Cinzel',serif;
  font-size:9px;
  letter-spacing:0.08em;
  color:var(--text-muted);
  text-align:center;
}

/* ─── LETTER GRID ───────────────────────────── */
.letter-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:8px;
  margin-top:4px;
}
.letter-card{
  aspect-ratio:1;
  background:var(--card-bg);
  border:1px solid var(--card-border);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-family:'Cormorant Garamond',serif;
  font-size:22px;
  font-weight:400;
  color:var(--text);
  transition:border-color 150ms,background 150ms;
}
.letter-card.selected{
  border-color:var(--accent);
  background:rgba(192,132,252,0.18);
  box-shadow:0 0 20px rgba(192,132,252,0.4);
  animation:goldFlash 350ms ease forwards;
}

/* ─── LOADING ───────────────────────────────── */
.loading{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:80vh;
  text-align:center;
  padding:40px 0;
}
.load-card{
  width:100px;height:160px;
  background:linear-gradient(160deg,#1a0525,#2d0a45);
  border:2px solid rgba(245,158,11,0.6);
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:52px;
  margin-bottom:40px;
  box-shadow:0 0 30px rgba(124,45,146,0.6);
  animation:spinCard 8s linear infinite;
  position:relative;
}
.load-card::before{
  content:'';
  position:absolute;
  inset:6px;
  border:1px solid rgba(245,158,11,0.3);
  border-radius:6px;
}
@keyframes spinCard{
  0%{transform:rotateY(0deg)}
  50%{transform:rotateY(180deg)}
  100%{transform:rotateY(360deg)}
}
.load-bar-wrap{
  width:100%;
  max-width:300px;
  height:4px;
  background:rgba(192,132,252,0.15);
  border-radius:99px;
  overflow:hidden;
  margin-bottom:32px;
}
.load-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--primary),var(--gold));
  border-radius:99px;
  box-shadow:0 0 8px rgba(245,158,11,0.6);
  transition:width 500ms ease;
}
.load-texts{
  min-height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.load-txt{
  font-family:'Cormorant Garamond',serif;
  font-size:16px;
  font-style:italic;
  color:var(--accent);
  opacity:0;
  transition:opacity 500ms;
  text-align:center;
  line-height:1.5;
  position:absolute;
}
.load-txt.active{opacity:1}

/* ─── RESULT ────────────────────────────────── */
.result{padding-top:28px;max-width:420px;margin:0 auto;width:100%;text-align:center}

.result-header{
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.2em;
  color:var(--gold);margin-bottom:20px;line-height:2;
  text-shadow:0 0 18px rgba(245,158,11,0.7);
  opacity:1;
}
.result-title{
  font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:600;
  color:var(--accent);margin-bottom:28px;line-height:1.35;
  text-shadow:0 0 24px rgba(192,132,252,0.45);
}

/* Flip cards */
.flip-hint{
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:0.15em;
  color:var(--gold);margin-bottom:14px;
  animation:pulseText 2s ease-in-out infinite;
}
@keyframes pulseText{0%,100%{opacity:0.55}50%{opacity:1}}
.flip-cards{display:flex;gap:14px;margin-bottom:28px}
.flip-card{
  flex:1;
  aspect-ratio:2/3.5;
  height:auto;
  cursor:pointer;perspective:1000px;
}
.flip-card-inner{
  width:100%;height:100%;position:relative;
  transform-style:preserve-3d;transition:transform 0.7s cubic-bezier(.4,0,.2,1);
  will-change:transform;
}
.flip-card.flipped .flip-card-inner{transform:rotateY(180deg)}
.flip-front,.flip-back{
  position:absolute;inset:0;
  backface-visibility:hidden;-webkit-backface-visibility:hidden;
  border-radius:12px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:12px;padding:20px 12px;text-align:center;
}
.flip-front{
  background:linear-gradient(175deg,#1a0525 0%,#2d0a45 50%,#1a0525 100%);
  border:2px solid rgba(245,158,11,0.45);
  box-shadow:0 8px 32px rgba(124,45,146,0.5),inset 0 0 30px rgba(124,45,146,0.15);
  overflow:hidden;
}
/* Ornate inner border */
.flip-front::before{
  content:'';position:absolute;inset:6px;
  border:1px solid rgba(245,158,11,0.2);
  border-radius:8px;pointer-events:none;
}
/* Corner ornaments */
.flip-front::after{
  content:'✦';position:absolute;bottom:10px;
  font-size:10px;color:rgba(245,158,11,0.35);letter-spacing:4px;
  word-spacing:4px;
}
.flip-front-hint{
  font-size:9px;color:rgba(245,158,11,0.55);
  letter-spacing:0.1em;position:relative;z-index:1;
  font-family:'Cinzel',serif;
}
.flip-corner{
  position:absolute;font-size:9px;color:rgba(245,158,11,0.3);line-height:1;
}
.flip-corner.tl{top:10px;left:10px}
.flip-corner.tr{top:10px;right:10px}
.flip-stars{
  position:absolute;inset:0;
  display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(5,1fr);
  align-items:center;justify-items:center;
  font-size:7px;color:rgba(245,158,11,0.08);pointer-events:none;
}
.flip-front-icon{
  font-size:36px;color:var(--gold);
  text-shadow:0 0 28px rgba(245,158,11,0.8);position:relative;z-index:1;
}
.flip-back{transform:rotateY(180deg)}
.flip-back.good{
  background:linear-gradient(175deg,#011f16 0%,#064e3b 50%,#011f16 100%);
  border:2px solid rgba(52,211,153,0.85);
  box-shadow:0 8px 32px rgba(52,211,153,0.3),inset 0 0 30px rgba(52,211,153,0.06);
}
.flip-back.bad{
  background:linear-gradient(175deg,#1a0000 0%,#7f1d1d 50%,#1a0000 100%);
  border:2px solid rgba(248,113,113,0.85);
  box-shadow:0 8px 32px rgba(248,113,113,0.25),inset 0 0 30px rgba(248,113,113,0.06);
}
.flip-back::before{
  content:'';position:absolute;inset:6px;
  border:1px solid rgba(255,255,255,0.07);
  border-radius:8px;pointer-events:none;
}
.flip-back-icon{font-size:28px;margin-bottom:4px;position:relative;z-index:1}
.flip-back-title{
  font-family:'Cinzel',serif;font-size:10.5px;letter-spacing:0.04em;
  font-weight:600;line-height:1.5;position:relative;z-index:1;
  width:100%;
}
.flip-back.good .flip-back-title{color:#86efac}
.flip-back.bad .flip-back-title{color:#fca5a5}
.flip-back-sub{font-size:10px;opacity:0.6;line-height:1.45;position:relative;z-index:1}
.flip-back.good .flip-back-sub{color:#86efac}
.flip-back.bad .flip-back-sub{color:#fca5a5}

/* Alert + Hope cards */
.alert-card,.hope-card{
  border-radius:16px;padding:24px 22px;margin-bottom:16px;text-align:center;
}
.alert-card{
  background:rgba(127,29,29,0.2);
  animation:alertPulse 2.2s ease-in-out infinite;
}
@keyframes alertPulse{
  0%,100%{border:1.5px solid rgba(252,165,165,0.35);box-shadow:none}
  50%{border:1.5px solid rgba(252,165,165,0.75);box-shadow:0 0 18px rgba(252,165,165,0.1)}
}
.hope-card{
  background:rgba(120,53,15,0.2);
  animation:hopePulse 2.5s ease-in-out infinite;
}
@keyframes hopePulse{
  0%,100%{border:1.5px solid rgba(245,158,11,0.25);box-shadow:none}
  50%{border:1.5px solid rgba(245,158,11,0.65);box-shadow:0 0 18px rgba(245,158,11,0.1)}
}
.msg-icon{font-size:26px;display:block;margin-bottom:12px}
.alert-card p{font-size:14px;line-height:1.85;color:rgba(252,165,165,0.9);margin-bottom:10px}
.alert-card p:last-child{margin-bottom:0}
.hope-card p{font-size:14px;line-height:1.85;color:rgba(251,191,36,0.9);margin-bottom:10px}
.hope-card p:last-child{margin-bottom:0}

/* Blocked pages */
.blocked-section{margin-bottom:20px}
.blocked-title{

(function(){
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W,H,particles=[],mx=0,my=0,paused=false,rafId=null,mousePending=false;

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  }

  function mkP(){
    return{
      x:Math.random()*W, y:Math.random()*H,
      r:Math.random()*1.8+0.3,
      vx:(Math.random()-.5)*.25,
      vy:(Math.random()-.5)*.25-.08,
      a:Math.random()*.6+.2,
      da:(Math.random()-.5)*.008,
      gold:Math.random()>.72
    };
  }

  function init(){
    resize();
    particles=[];
    for(let i=0;i<12;i++) particles.push(mkP());
  }

  function draw(){
    if(paused){rafId=null;return;}
    ctx.clearRect(0,0,W,H);
    const px=mx/W-.5, py=my/H-.5;
    let lastGold=null;
    particles.forEach(p=>{
      p.x+=p.vx+px*.06;
      p.y+=p.vy+py*.03;
      p.a+=p.da;
      if(p.a>0.85){p.a=0.85;p.da*=-1;}
      if(p.a<0.1){p.a=0.1;p.da*=-1;}
      if(p.y<-5) p.y=H+5;
      if(p.x<-5) p.x=W+5;
      if(p.x>W+5) p.x=-5;
      if(p.gold!==lastGold){ctx.fillStyle=p.gold?'#f59e0b':'#c084fc';lastGold=p.gold;}
      ctx.globalAlpha=p.a;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fill();
    });
    ctx.globalAlpha=1;
    rafId=requestAnimationFrame(draw);
  }

  window.addEventListener('resize',init);
  window.addEventListener('mousemove',e=>{
    if(!mousePending){
      mousePending=true;
      requestAnimationFrame(()=>{mx=e.clientX;my=e.clientY;mousePending=false;});
    }
  },{passive:true});
  document.addEventListener('visibilitychange',()=>{
    if(document.hidden){paused=true;}
    else{paused=false;if(!rafId)draw();}
  });
  init();draw();
})();

// TRANSITION
// ═══════════════════════════════════════════════
function transition(renderFn){
  const screen = document.getElementById('screen');
  screen.classList.add('s-out');
  window.scrollTo(0,0);
  setTimeout(()=>{
    renderFn();
    screen.classList.remove('s-out');
  }, 70);
}

// ═══════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════
function updateProgress(step){
  const wrap = document.getElementById('prog-wrap');
  const fill = document.getElementById('prog-fill');
  const label = document.getElementById('prog-label');
  if(step >= 1 && step <= 12){
    wrap.style.display = 'block';
    label.textContent = `Etapa ${step} de 12`;
    fill.style.width = ((step/12)*100)+'%';
  } else {
    wrap.style.display = 'none';
  }
}

// SELECT OPTION
// ═══════════════════════════════════════════════
let _selOpt=null, _selSign=null, _selLetter=null;

function selectOpt(el, key, value){
  if(_selOpt) _selOpt.classList.remove('selected');
  _selOpt = el;
  el.classList.add('selected');
  state.answers[key] = value;
  setTimeout(goNext, 200);
}

function selectSign(el, key, name){
  if(_selSign) _selSign.classList.remove('selected');
  _selSign = el;
  el.classList.add('selected');
  state.answers[key] = name;
  setTimeout(goNext, 180);
}

function selectLetter(el, letter){
  if(_selLetter) _selLetter.classList.remove('selected');
  _selLetter = el;
  el.classList.add('selected');
  state.answers.inicial = letter;
  setTimeout(goNext, 180);
}

// GO NEXT
// ═══════════════════════════════════════════════
const STEP_LABELS=['','Sentimento','Tempo','Info Tarô','Situação','Comportamento','Desencadeador','Frequência','Info Cartas','Foco','Signo Dele','Signo Dela','Inicial'];
function goNext(){
  state.step++;
  if(state.step > 12){
    trackStep(13,'loading');
    startLoading();
  } else {
    trackStep(state.step, STEP_LABELS[state.step]||'Step '+state.step);
    updateProgress(state.step);
    transition(()=>renderStep(state.step));
  }
}

// ═══════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════
function renderStep(n){
  const data = STEPS[n-1];
  if(!data) return;
  if(data.type === 'question') renderQuestion(data);
  else if(data.type === 'info') renderInfo(data);
  else if(data.type === 'info-visual') renderInfoVisual(data);
  else if(data.type === 'signs') renderSigns(data);
  else if(data.type === 'letters') renderLetters(data);
}

function renderQuestion(data){
  const screen = document.getElementById('screen');
  screen.innerHTML = `
    <div class="step-wrap">
      <div class="step-sub">${data.sub.replace(/\n/g,'<br>')}</div>
      <div class="step-q">${data.q}</div>
      <div class="options">
        ${data.opts.map((o,i)=>{
          let left = o.dot
            ? `<span class="opt-dot" style="background:${o.dot}"></span>`
            : `<span class="opt-icon">${o.e}</span>`;
          return `<div class="opt" data-val="${o.v}" onclick="selectOpt(this,'${data.key}','${o.v}')">
            ${left}
            <span class="opt-text">${o.t}</span>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  // Animate options in sequence
}

function startLoading(){
  updateProgress(0);
  const A = state.answers;

  const texts = [
    `Interpretando a energia de <em>${A.signo_dele}</em> e <em>${A.signo_dela}</em>...`,
    `Escaneando a presença de terceiros ao redor do vínculo...`,
    `Identificando onde ele ainda é vulnerável a você...`,
    `Carta dominante encontrada...`,
    `<strong style="color:#f59e0b">A Torre em posição direta.</strong>`,
    `✦ O que ele esconde está prestes a ser revelado. ✦`
  ];

  const screen = document.getElementById('screen');
  screen.classList.remove('s-out','s-in');
  screen.innerHTML = `
    <div class="loading">
      <div class="load-card">⚡</div>
      <div class="load-bar-wrap"><div class="load-bar" id="lbar"></div></div>
      <div class="load-texts" style="position:relative;width:100%;max-width:320px;height:72px">
        ${texts.map((t,i)=>`<div class="load-txt" id="lt${i}">${t}</div>`).join('')}
      </div>
    </div>`;

  const bar = document.getElementById('lbar');
  let phase = 0;

  function nextPhase(){
    if(phase > 0){
      const prev = document.getElementById(`lt${phase-1}`);
      if(prev) prev.classList.remove('active');
    }
    if(phase < texts.length){
      const cur = document.getElementById(`lt${phase}`);
      if(cur) cur.classList.add('active');
      bar.style.width = ((phase+1)/texts.length*100)+'%';
      phase++;
      if(phase < texts.length){
        setTimeout(nextPhase, 700);
      } else {
        setTimeout(showResult, 800);
      }
    }
  }

  setTimeout(nextPhase, 400);
}

function tempoLabel(v){
  const map = {
    'menos-6m':'menos de 6 meses',
    '6m-2a':'1 a 2 anos',
    '2a-5a':'2 a 5 anos',
    'mais-5a':'mais de 5 anos'
  };
  return map[v] || v;
}

// ─── CAROUSEL ───────────────────────────────────
function scrollDep(idx){
  const c = document.getElementById('depCarousel');
  if(!c) return;
  const card = c.querySelectorAll('.dep-card')[idx];
  if(card) card.scrollIntoView({behavior:'smooth',block:'nearest',inline:'start'});
  document.querySelectorAll('.dep-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}
(function initCarouselObserver(){
  const tryInit = ()=>{
    const c = document.getElementById('depCarousel');
    if(!c) return;
    const cards = c.querySelectorAll('.dep-card');
    const obs = new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        if(e.intersectionRatio > 0.5){
          const idx = [...cards].indexOf(e.target);
          document.querySelectorAll('.dep-dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
        }
      });
    },{root:c,threshold:0.5});
    cards.forEach(card=>obs.observe(card));
  };
  document.addEventListener('DOMContentLoaded', tryInit);
  setTimeout(tryInit, 100);
})();
